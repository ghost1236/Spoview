spring:
  profiles:
    active: local

  jpa:
    hibernate:
      ddl-auto: validate
    properties:
      hibernate:
        format_sql: true
        default_batch_fetch_size: 100
    open-in-view: false

  jackson:
    default-property-inclusion: non_null
    serialization:
      write-dates-as-timestamps: false

  flyway:
    enabled: true
    baseline-on-migrate: true
    locations: classpath:db/migration

  task:
    scheduling:
      pool:
        size: 5

server:
  port: 8090

ncloud:
  object-storage:
    endpoint: https://kr.object.ncloudstorage.com
    region: kr-standard
    access-key: ${NCLOUD_ACCESS_KEY:}
    secret-key: ${NCLOUD_SECRET_KEY:}
    bucket: ${NCLOUD_BUCKET:sportshub-images}
    cdn-url: ${NCLOUD_CDN_URL:}

webpush:
  vapid:
    public-key: ${VAPID_PUBLIC_KEY:}
    private-key: ${VAPID_PRIVATE_KEY:}
    subject: mailto:smiling1236@gmail.com
  shutdown: graceful

logging:
  level:
    kr.smiling.sportshub: DEBUG
    org.hibernate.SQL: DEBUG
