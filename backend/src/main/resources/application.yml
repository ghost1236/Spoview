spring:
  profiles:
    active: local

  jpa:
    hibernate:
      ddl-auto: validate
    properties:
      hibernate:
        format_sql: true
        default_batch_fetch_size: 100
    open-in-view: false

  jackson:
    default-property-inclusion: non_null
    serialization:
      write-dates-as-timestamps: false

  flyway:
    enabled: true
    baseline-on-migrate: true
    locations: classpath:db/migration

  task:
    scheduling:
      pool:
        size: 5

server:
  port: 8090
  shutdown: graceful

logging:
  level:
    kr.smiling.sportshub: DEBUG
    org.hibernate.SQL: DEBUG
